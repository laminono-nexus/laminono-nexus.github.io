<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laminono Nexus - Premium Storytelling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E50914;
            --primary-dark: #B20710;
            --bg-dark: #141414;
            --bg-darker: #0A0A0A;
            --bg-card: #1F1F1F;
            --bg-hover: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #B3B3B3;
            --text-muted: #808080;
            --gradient-hero: linear-gradient(to top, #141414 0%, transparent 60%),
                              linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 50%);
            --shadow-elevated: 0 20px 40px rgba(0,0,0,0.6);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Navigation */
        .navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 4%;
    display: flex;
    justify-content: space-between;  /* Keep this as space-between */
    align-items: center;
    z-index: 1000;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    transition: var(--transition-smooth);
}
        
        .navbar.scrolled {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 4%;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--text-primary);
            font-weight: 300;
        }

        .nav-links {
    display: flex;
    gap: 30px;
    align-items: center;
    margin-left: auto;  /* This pushes nav links to the right */
}

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            position: relative;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: var(--transition-smooth);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .admin-badge {
            background: var(--primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: flex-end;
            padding: 0 4% 150px;
            background: var(--gradient-hero),
                        url('https://images.unsplash.com/photo-1457369804613-52c61a468e7d?w=1920&q=80') center/cover;
            background-blend-mode: normal;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, var(--bg-dark) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(229, 9, 20, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 20px;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.5);
        }

        .hero-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hero-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .hero-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            background: rgba(255,255,255,0.9);
            transform: scale(1.05);
        }

        .btn-secondary {
            background: rgba(109, 109, 110, 0.7);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(109, 109, 110, 0.9);
            transform: scale(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--text-secondary);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--text-primary);
            background: rgba(255,255,255,0.1);
        }

        /* Content Sections */
        .content-section {
            padding: 40px 4%;
            position: relative;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '›';
            color: var(--primary);
            font-size: 1.8rem;
            transition: transform 0.3s;
        }

        .section-header:hover .section-title::after {
            transform: translateX(5px);
        }

        .explore-all {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s;
        }

        .explore-all:hover {
            color: var(--text-primary);
        }

        /* Story Rows */
        .story-row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 20px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .story-row::-webkit-scrollbar {
            display: none;
        }

        .story-card {
            flex: 0 0 auto;
            width: 280px;
            height: 380px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: var(--bg-card);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .story-card:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: var(--shadow-elevated);
        }

        .story-card-image {
            width: 100%;
            height: 70%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .story-card:hover .story-card-image {
            transform: scale(1.1);
        }

        .story-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
            transition: var(--transition-smooth);
        }

        .story-card:hover .story-card-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.5) 100%);
        }

        .story-genre {
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .story-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .story-excerpt {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition-smooth);
        }

        .story-card:hover .story-excerpt {
            opacity: 1;
            transform: translateY(0);
        }

        .story-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition-smooth);
        }

        .story-card:hover .story-actions {
            opacity: 1;
            transform: translateY(0);
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .action-btn:hover {
            background: white;
            color: black;
            border-color: white;
            transform: scale(1.1);
        }

        .action-btn.play {
            background: var(--primary);
            border-color: var(--primary);
        }

        .action-btn.play:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        /* Featured Grid */
        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .featured-card {
            position: relative;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .featured-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-elevated);
        }

        .featured-card-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }

        .featured-card:hover .featured-card-bg {
            transform: scale(1.05);
        }

        .featured-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
        }

        .featured-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .featured-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .featured-author {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .featured-author strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Story Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        .modal.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            max-width: 900px;
            margin: 50px auto;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }

        .modal-hero {
            height: 400px;
            position: relative;
            background: linear-gradient(to top, var(--bg-card) 0%, transparent 100%),
                        url('https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=1200&q=80') center/cover;
        }

        .modal-body {
            padding: 40px;
            margin-top: -100px;
            position: relative;
            z-index: 2;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .modal-meta {
            display: flex;
            gap: 20px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .narration-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-hover);
            padding: 15px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .voice-selector {
            display: flex;
            gap: 10px;
        }

        .voice-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 0.9rem;
        }

        .voice-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .voice-btn:hover:not(.active) {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .narrate-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: white;
            color: black;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .narrate-btn:hover {
            transform: scale(1.05);
            background: var(--primary);
            color: white;
        }

        .narrate-btn.playing {
            background: var(--primary);
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(229, 9, 20, 0); }
        }

        .story-text {
            font-size: 1.1rem;
            line-height: 2;
            color: var(--text-secondary);
            column-count: 1;
            column-gap: 40px;
        }

        .story-text p {
        boy's hand in his… went still. Daniel's heart dropped. "No… not now…" The world had paused again. And the clock appeared. Right in front of him. Burning… but untouched by the fire. Tick. Tick. A message formed across its cracked glass: "Interference detected." "Timeline deviation: unauthorized."</p>
            
            <p>Daniel stepped back. "I was trying to help!" The ticking grew louder. Sharper. Almost angry. "Return immediately." The boy's frozen face stared up at him. So close to being saved. Daniel clenched his jaw. "No…" But the clock didn't wait.</p>
            
            <p>The world snapped. Daniel collapsed onto his apartment floor, gasping violently. His chest burned. His throat felt raw from smoke that shouldn't exist anymore. He coughed hard, trying to breathe. Then he noticed something. His hand. Burn marks. Real. Painful. "This… this is real…"</p>
            
            <p>His phone buzzed again. New message. "You broke the rule." Another one followed. "You are not there to save them." "You are there to observe." Daniel stared at the screen, anger rising in his chest. "Then why send me there?" he whispered. The reply came instantly. "To learn."</p>
            
            <p>Daniel's grip tightened around the phone. Another message appeared. "Next jump in 00:59." A countdown began. 59… 58… 57… Daniel's breathing slowed. But his eyes hardened. "This time…" he said quietly, "I'm not just watching." The countdown continued.</p>

        <div class="bio-section">
            <h3>About the Author</h3>
            <p class="bio-text"><strong>Olamide Emmanuel Willoughby</strong> — <em>Laminono</em> is a creative writer, poet, and visual storyteller whose work educates, entertains, informs, and evokes powerful flashbacks. As a media professional, he crafts narratives that linger in the mind long after the final word.</p>

        <div class="rating-section">
            <div class="rating-title">How would you rate this episode?</div>
            <div class="stars" onclick="rateStory(event)">
                <span class="star" data-rating="1">★</span>
                <span class="star" data-rating="2">★</span>
                <span class="star" data-rating="3">★</span>
                <span class="star" data-rating="4">★</span>
                <span class="star" data-rating="5">★</span>
            </div>
            <div id="rating-msg" style="margin-top:15px;color:#666;font-size:0.9rem"></div>
        </div>

        <div class="comment-section">
            <h3>Share Your Thoughts</h3>
            <textarea class="comment-box" placeholder="What did you think of Part 2? Will Daniel break the rules again? Share your theories..."></textarea>
            <button class="submit-btn" onclick="submitComment()">Post Comment</button>
            <div id="comments-list" style="margin-top:30px"></div>
        </div>
    </div>

    <div class="footer">
        © 2024 Laminono Nexus. Curated by Olamide Emmanuel Willoughby — <em>Laminono</em>
    </div>

    <script>
        function rateStory(e){
            if(e.target.classList.contains('star')){
                const rating=e.target.dataset.rating;
                document.querySelectorAll('.star').forEach((s,i)=>{
                    s.classList.toggle('active',i<rating);
                });
                document.getElementById('rating-msg').textContent='Thanks for rating! '+rating+' stars saved.';
                localStorage.setItem('chronos-p2-rating',rating);
            }
        }
        
        function submitComment(){
            const box=document.querySelector('.comment-box');
            const text=box.value.trim();
            if(!text)return alert('Please write a comment first');
            
            const list=document.getElementById('comments-list');
            const div=document.createElement('div');
            div.style.cssText='padding:20px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:15px;border-left:3px solid #e50914';
            div.innerHTML='<div style="color:#e50914;font-size:0.85rem;margin-bottom:8px">Reader • Just now</div><div style="color:#e8e8e8;line-height:1.6">'+text.replace(/\n/g,'<br>')+'</div>';
            list.insertBefore(div,list.firstChild);
            box.value='';
            
            const comments=JSON.parse(localStorage.getItem('chronos-p2-comments')||'[]');
            comments.unshift({text:text,time:new Date().toLocaleString()});
            localStorage.setItem('chronos-p2-comments',JSON.stringify(comments));
        }
        
        window.onload=function(){
            const saved=localStorage.getItem('chronos-p2-rating');
            if(saved){
                document.querySelectorAll('.star').forEach((s,i)=>{
                    s.classList.toggle('active',i<saved);
                });
            }
            const comments=JSON.parse(localStorage.getItem('chronos-p2-comments')||'[]');
            comments.forEach(c=>{
                const div=document.createElement('div');
                div.style.cssText='padding:20px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:15px;border-left:3px solid #e50914';
                div.innerHTML='<div style="color:#e50914;font-size:0.85rem;margin-bottom:8px">Reader • '+c.time+'</div><div style="color:#e8e8e8;line-height:1.6">'+c.text.replace(/\n/g,'<br>')+'</div>';
                document.getElementById('comments-list').appendChild(div);
            });
        };
    </script>
