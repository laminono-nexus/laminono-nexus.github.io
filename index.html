<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B7YT12YB25"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B7YT12YB25');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laminono Nexus — Premium Storytelling</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* This ensures your bookshelf is never blocked by other layers */
        #floating-book-trigger {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 99999 !important;
            cursor: pointer;
            pointer-events: auto !important;
            display: block;
        }

        /* Login Overlay */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="auth-overlay" style="display: none;">
        <h2 style="margin-bottom: 20px;">Laminono Nexus</h2>
        <div id="g_id_onload"
             data-client_id="762207905640-vh5n2i6l96v7q28m4q7l888888888888.apps.googleusercontent.com"
             data-callback="onGoogleSignIn"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="site-wrapper" style="opacity: 0;">
        <div id="floating-book-trigger">
            <img src="https://laminono-nexus.github.io/laminono.jpeg" alt="Library" style="width:60px; border-radius:50%; border:2px solid gold;">
        </div>
    </div>

    <script type="module">
        import { stories, updatePageSEO } from './stories.js';

        // Fix for the Login Loop: This handles the response from Google
        window.onGoogleSignIn = (response) => {
            console.log("Login Successful");
            localStorage.setItem('laminono_logged_in', 'true');
            unlockSite();
        };

        function unlockSite() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('site-wrapper').style.opacity = '1';
        }

        window.onload = () => {
            // Check if user already logged in previously
            if (localStorage.getItem('laminono_logged_in') === 'true') {
                unlockSite();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }

            // Fix for the Bookshelf Click
            const shelf = document.getElementById('floating-book-trigger');
            if (shelf) {
                shelf.onclick = () => {
                    window.location.href = 'bookshelf.html';
                };
            }

            // SEO Management from your stories.js module
            const params = new URLSearchParams(window.location.search);
            const storyId = params.get('story');
            if (storyId) {
                const activeStory = stories.find(s => s.id === storyId);
                if (activeStory) updatePageSEO(activeStory);
            }
        };
    </script>
</body>
</html>
