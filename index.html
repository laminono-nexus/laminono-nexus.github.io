    <style>
        /* I am leaving this space for your original CSS. 
           Please make sure your existing CSS block is kept exactly as is!
        */
        
        /* THE ONLY NEW CSS ADDED: A beautiful, cinematic login overlay */
        #login-gatekeeper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .gate-logo { color: #E50914; font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-gatekeeper">
        <div class="gate-logo">NEXUS</div>
        <p style="margin-bottom: 25px;">Sign in to unlock full access to Olamide's stories.</p>
        <div id="g_id_onload"
             data-client_id="762207905640-vh5n2i6l96v7q28m4q7l888888888888.apps.googleusercontent.com"
             data-callback="onGoogleAuth"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <script type="module">
        import { stories, updatePageSEO, resetToHomeSEO } from './stories.js';

        // --- GATEKEEPER LOGIC ---

        // 1. Success Handler
        window.onGoogleAuth = (response) => {
            localStorage.setItem('laminono_nexus_auth', 'unlocked');
            document.getElementById('login-gatekeeper').style.display = 'none';
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        };

        // 2. The First Click Listener
        document.addEventListener('click', function(e) {
            const isUnlocked = localStorage.getItem('laminono_nexus_auth');
            
            if (!isUnlocked) {
                // If they haven't logged in, block the click and show the prompt
                document.getElementById('login-gatekeeper').style.display = 'flex';
                document.body.style.overflow = 'hidden'; // Lock the page
                
                // Allow the Google Sign-in button itself to be clicked
                if (!e.target.closest('.g_id_signin')) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            }
        }, true);

        // 3. Keep site unlocked if they've already logged in
        window.onload = () => {
            if (localStorage.getItem('laminono_nexus_auth') === 'unlocked') {
                document.getElementById('login-gatekeeper').style.display = 'none';
            }
        };

        /* KEEP ALL YOUR ORIGINAL JAVASCRIPT BELOW 
           (The story rendering, audio handling, and SEO logic)
        */
    </script>
