    let storyRatings  = JSON.parse(localStorage.getItem('laminonoRatings')  || '{}');
    let storyComments = JSON.parse(localStorage.getItem('laminonoComments') || '{}');

    // ── LOAD STORIES FROM JSON ──
    async function loadStories() {
        try {
            const res = await fetch('stories.json');
            stories = await res.json();
        } catch (e) {
            console.error('Could not load stories.json:', e);
            stories = [];
        }
        renderStories();
        checkDeepLink();
    }

    // ── RENDER ──
    function renderStories() {
        const trending    = stories.filter(s => s.trending);
        const newReleases = stories.slice(0, 6);
        const featured    = stories.slice(0, 3);

        document.getElementById('trendingRow').innerHTML    = trending.map(createStoryCard).join('');
        document.getElementById('newReleasesRow').innerHTML = newReleases.map(createStoryCard).join('');
        document.getElementById('featuredGrid').innerHTML   = featured.map(createFeaturedCard).join('');
    }

    function createStoryCard(story) {
        return `
            <div class="story-card" onclick="openStory('${story.id}')">
                <img src="${story.image}" alt="${story.title}" class="story-card-image"
                     onerror="this.src='https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=800&q=80'">
                <div class="story-card-vignette"></div>
                <div class="story-cover-time">⏱ ${story.readTime}</div>
                <div class="story-cover-title">${story.title}</div>
                <div class="story-cover-genre">${story.genre}</div>
                <div class="story-card-overlay" onclick="event.stopPropagation()">
                    <p class="story-excerpt">${story.excerpt}</p>
                    <div class="story-actions">
                        <button class="action-btn play" onclick="openStory('${story.id}');setTimeout(toggleNarration,400);" title="Narrate">▶</button>
                        <button class="action-btn" onclick="currentStory=stories.find(s=>s.id==='${story.id}');toggleMyList();" title="Add to List">+</button>
                        <button class="action-btn" onclick="currentStory=stories.find(s=>s.id==='${story.id}');openShareModal();" title="Share">↗</button>
                    </div>
                </div>
            </div>`;
    }

    function createFeaturedCard(story) {
        return `
            <div class="featured-card" onclick="openStory('${story.id}')">
                <img src="${story.image}" alt="${story.title}" class="featured-card-bg"
                     onerror="this.src='https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=800&q=80'">
                <div class="featured-vignette"></div>
                <div class="featured-content">
                    <span class="featured-badge">Featured</span>
                    <h3 class="featured-cover-title">${story.title}</h3>
                    <p class="featured-author">By <strong>Olamide Emmanuel Willoughby</strong> • ${story.readTime} read</p>
                    <p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.5;">${story.excerpt}</p>
                </div>
            </div>`;
    }

    // ── MODAL ──
    function openStory(storyId) {
        const story = stories.find(s => s.id === storyId) || stories[0];
        if (!story) return;
        currentStory = story;

        document.getElementById('modalTitle').textContent = story.title;
        document.getElementById('modalMeta').innerHTML =
            `<span>⏱ ${story.readTime} read</span>
             <span>📖 ${story.genre}</span>
             <span>👤 By Olamide Emmanuel Willoughby</span>`;
        document.getElementById('modalHero').style.cssText =
            `height:400px;position:relative;background:linear-gradient(to top,var(--bg-card) 0%,transparent 100%), url('${story.image}') center/cover;`;

        const paragraphs = story.content.split('\n\n').filter(p => p.trim());
        document.getElementById('storyText').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');

        document.getElementById('storyModal').classList.add('active');
        document.body.style.overflow = 'hidden';

        // reset UI
        stopNarration();
        currentRating = 0;
        highlightStars(0);
        document.getElementById('ratingText').textContent = 'Click to rate';
        document.getElementById('mylist-btn-text').textContent = '+ My List';
        updateAverageRating();
        renderComments();

        if (typeof gtag !== 'undefined') gtag('event','open_story',{'event_category':'engagement','event_label':story.title});
    }

    function closeModal() {
        document.getElementById('storyModal').classList.remove('active');
        document.body.style.overflow = '';
        stopNarration();
    }

    // ── NARRATION ──
    function setVoice(gender, e) {
        selectedVoice = gender;
        document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
        if (e && e.target) e.target.classList.add('active');
        if (isNarrating) { stopNarration(); setTimeout(startNarration, 100); }
    }

    function toggleNarration() {
        isNarrating ? stopNarration() : startNarration();
    }

    function startNarration() {
        if (!currentStory) return;
        speechUtterance = new SpeechSynthesisUtterance(currentStory.content);
        const voices = window.speechSynthesis.getVoices();
        let preferred;
        if (selectedVoice === 'female') {
            preferred = voices.find(v => /Female|Samantha|Victoria/i.test(v.name));
        } else {
            preferred = voices.find(v => /Male|Daniel|Alex/i.test(v.name));
        }
        if (preferred) speechUtterance.voice = preferred;
        speechUtterance.rate  = 0.9;
        speechUtterance.pitch = selectedVoice === 'female' ? 1.1 : 0.9;
        speechUtterance.onstart = () => {
            isNarrating = true;
            document.getElementById('narrateIcon').textContent = '⏸';
            document.getElementById('narrateText').textContent = 'Pause Narration';
            document.querySelector('.narrate-btn').classList.add('playing');
            document.getElementById('visualizer').classList.add('active');
        };
        speechUtterance.onend = stopNarration;
        window.speechSynthesis.speak(speechUtterance);
    }

    function stopNarration() {
        window.speechSynthesis.cancel();
        isNarrating = false;
        const btn = document.querySelector('.narrate-btn');
        if (btn) btn.classList.remove('playing');
        const ni = document.getElementById('narrateIcon');
        const nt = document.getElementById('narrateText');
        if (ni) ni.textContent = '▶';
        if (nt) nt.textContent = 'Narrate Story';
        document.getElementById('visualizer').classList.remove('active');
    }

    // ── RATINGS ──
    document.querySelectorAll('.star').forEach(star => {
        star.addEventListener('mouseenter', () => {
            highlightStars(parseInt(star.dataset.rating));
            document.getElementById('ratingText').textContent = getRatingText(parseInt(star.dataset.rating));
        });
        star.addEventListener('mouseleave', () => {
            highlightStars(currentRating);
            document.getElementById('ratingText').textContent = currentRating > 0 ? 'You rated ' + currentRating + ' stars' : 'Click to rate';
        });
        star.addEventListener('click', () => submitRating(parseInt(star.dataset.rating)));
    });

    function highlightStars(count) {
        document.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('active', i < count));
    }
    function getRatingText(r) { return ['Poor','Fair','Good','Very Good','Excellent'][r-1] || 'Click to rate'; }

    function submitRating(rating) {
        if (!currentStory) return;
        currentRating = rating;
        highlightStars(rating);
        document.getElementById('ratingText').textContent = 'You rated ' + rating + ' stars!';
        if (!storyRatings[currentStory.id]) storyRatings[currentStory.id] = {total:0,sum:0};
        const rated = JSON.parse(localStorage.getItem('ratedStories') || '[]');
        if (!rated.includes(currentStory.id)) {
            storyRatings[currentStory.id].total++;
            storyRatings[currentStory.id].sum += rating;
            rated.push(currentStory.id);
            localStorage.setItem('ratedStories', JSON.stringify(rated));
            localStorage.setItem('laminonoRatings', JSON.stringify(storyRatings));
            if (typeof gtag !== 'undefined') gtag('event','rate_story',{'event_category':'engagement','event_label':currentStory.title,'value':rating});
            showToast('Thank you for rating!');
        } else { showToast('You already rated this story!'); }
        updateAverageRating();
    }

    function updateAverageRating() {
        if (!currentStory || !storyRatings[currentStory.id]) {
            document.getElementById('averageScore').textContent = '0.0';
            document.getElementById('averageStars').textContent = '★★★★★';
            document.getElementById('totalVotes').textContent   = '(0 ratings)';
            return;
        }
        const d = storyRatings[currentStory.id];
        const avg = (d.sum / d.total).toFixed(1);
        const full = Math.round(avg);
        document.getElementById('averageScore').textContent = avg;
        document.getElementById('averageStars').textContent = '★'.repeat(full) + '☆'.repeat(5-full);
        document.getElementById('totalVotes').textContent   = `(${d.total} rating${d.total!==1?'s':''})`;
    }

    // ── COMMENTS ──
    function submitComment(e) {
        e.preventDefault();
        if (!currentStory) return;
        const name = document.getElementById('commentName').value.trim();
        const text = document.getElementById('commentText').value.trim();
        if (!name || !text) return;
        const comment = {
            id: Date.now(), name, text,
            date: new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}),
            rating: currentRating,
            isAdmin: /laminono|olamide/i.test(name)
        };
        if (!storyComments[currentStory.id]) storyComments[currentStory.id] = [];
        storyComments[currentStory.id].unshift(comment);
        localStorage.setItem('laminonoComments', JSON.stringify(storyComments));
        if (typeof gtag !== 'undefined') gtag('event','post_comment',{'event_category':'engagement','event_label':currentStory.title});
        document.getElementById('commentName').value = '';
        document.getElementById('commentText').value = '';
        renderComments();
        showToast('Comment posted!');
    }

    function renderComments() {
        if (!currentStory) return;
        const comments = storyComments[currentStory.id] || [];
        document.getElementById('commentsCount').textContent = `(${comments.length})`;
        const list = document.getElementById('commentsList');
        if (!comments.length) { list.innerHTML = '<div class="no-comments">No comments yet. Be the first to share your thoughts!</div>'; return; }
        list.innerHTML = comments.map(c => `
            <div class="comment-card">
                <div class="comment-header">
                    <span class="comment-author">${c.name}${c.isAdmin?'<span class="admin-badge-small">Admin</span>':''}</span>
                    <span class="comment-date">${c.date}</span>
                </div>
                ${c.rating>0?`<div class="comment-rating">${'★'.repeat(c.rating)}</div>`:''}
                <div class="comment-text">${escapeHtml(c.text)}</div>
            </div>`).join('');
    }

    function escapeHtml(t) { const d=document.createElement('div');d.textContent=t;return d.innerHTML; }

    // ── ALL STORIES PAGE ──
    function showAllStories(type) {
        document.querySelector('.hero').classList.add('hidden');
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
        document.querySelector('.admin-section').classList.add('hidden');
        document.querySelector('footer').classList.add('hidden');
        document.getElementById('allStoriesPage').classList.remove('hidden');
        document.getElementById('allStoriesTitle').textContent = type === 'trending' ? 'Trending Stories' : 'All Stories';
        filterStories('all');
        window.scrollTo(0,0);
    }

    function backToHome() {
        document.querySelector('.hero').classList.remove('hidden');
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('hidden'));
        document.querySelector('.admin-section').classList.remove('hidden');
        document.querySelector('footer').classList.remove('hidden');
        document.getElementById('allStoriesPage').classList.add('hidden');
        window.scrollTo(0,0);
    }

    function filterStories(category) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === category || (category === 'all' && btn.textContent === 'All'));
        });
        const filtered = category === 'all' ? stories : stories.filter(s => s.genre === category);
        document.getElementById('allStoriesGrid').innerHTML = filtered.map(story => `
            <div class="story-card" onclick="openStory('${story.id}')" style="height:400px;flex:none;width:100%;">
                <img src="${story.image}" alt="${story.title}" class="story-card-image"
                     onerror="this.src='https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=800&q=80'">
                <div class="story-card-vignette"></div>
                <div class="story-cover-time">⏱ ${story.readTime}</div>
                <div class="story-cover-title">${story.title}</div>
                <div class="story-cover-genre">${story.genre}</div>
            </div>`).join('');
    }

    // ── TOAST ──
    function showToast(message) {
        const t = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── NAVBAR ──
    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });

    // ── FLOATING BOOK ──
    (function(){
        const el = document.getElementById('floating-book-trigger');
        let lastY = 0;
        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            el.style.top = (y > 60 && y >= lastY) ? '70px' : '-280px';
            lastY = y;
        }, {passive:true});
    })();

    // ── DEEP LINK ──
    function checkDeepLink() {
        const params  = new URLSearchParams(window.location.search);
        const storyId = params.get('story');
        if (storyId) setTimeout(() => openStory(storyId), 600);
    }

    // ── SMOOTH SCROLL ──
    document.querySelectorAll('a[href^="#"]').forEach(a => {
        a.addEventListener('click', e => {
            e.preventDefault();
            const t = document.querySelector(a.getAttribute('href'));
            if (t) t.scrollIntoView({behavior:'smooth',block:'start'});
        });
    });

    // ── ESCAPE TO CLOSE ──
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    window.speechSynthesis.onvoiceschanged = () => {};

    // ── INIT ──
    document.addEventListener('DOMContentLoaded', () => {
    renderStories();
    checkDeepLink();
});
<script type="module">
    import { stories } from './stories.js';


<!-- ── FIREBASE (Auth + Firestore + Share) ── -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyA4jdIQilVbAcdnc0mAxk8arTg9xvYDuzc",
    authDomain: "laminono-nexus.firebaseapp.com",
    projectId: "laminono-nexus",
    storageBucket: "laminono-nexus.firebasestorage.app",
    messagingSenderId: "762207905640",
    appId: "1:762207905640:web:9727e33d2f4d33bcc4d8dd"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser   = null;
let isSignUpMode  = false;
let pendingAction = null;

onAuthStateChanged(auth, user => {
    currentUser = user;
    const bar    = document.getElementById('user-profile-bar');
    const avatar = document.getElementById('user-avatar');
    if (user) {
        bar.style.display = 'flex';
        avatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || user.email) + '&background=E50914&color=fff';
        if (pendingAction === 'mylist') { pendingAction = null; openMyList(); }
    } else {
        bar.style.display = 'none';
    }
});

window.signInWithGoogle = async () => {
    try {
        document.getElementById('auth-error').textContent = '';
        await signInWithPopup(auth, provider);
        closeAuthModal();
        showToast('Welcome to Laminono Nexus! 🎉');
    } catch(e) { document.getElementById('auth-error').textContent = e.message.replace('Firebase: ',''); }
};

window.handleEmailAuth = async () => {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
    try {
        if (isSignUpMode) { await createUserWithEmailAndPassword(auth, email, password); showToast('Account created! Welcome 🎉'); }
        else { await signInWithEmailAndPassword(auth, email, password); showToast('Welcome back! 👋'); }
        closeAuthModal();
    } catch(e) {
        const msg = e.code === 'auth/wrong-password'       ? 'Incorrect password.'
                  : e.code === 'auth/user-not-found'        ? 'No account found with this email.'
                  : e.code === 'auth/email-already-in-use'  ? 'This email is already registered.'
                  : e.code === 'auth/weak-password'          ? 'Password must be at least 6 characters.'
                  : e.code === 'auth/invalid-email'          ? 'Please enter a valid email address.'
                  : e.message.replace('Firebase: ','');
        errEl.textContent = msg;
    }
};

window.forgotPassword = async () => {
    const email = document.getElementById('auth-email').value.trim();
    if (!email) { document.getElementById('auth-error').textContent = 'Enter your email above first.'; return; }
    try { await sendPasswordResetEmail(auth, email); showToast('Password reset email sent!'); }
    catch(e) { document.getElementById('auth-error').textContent = 'Could not send reset email.'; }
};

window.toggleAuthMode = () => {
    isSignUpMode = !isSignUpMode;
    document.getElementById('auth-modal-title').textContent  = isSignUpMode ? 'Create Your Account'    : 'Welcome Back';
    document.getElementById('auth-modal-sub').textContent    = isSignUpMode ? 'Join the story community.' : 'Sign in to access your reading list.';
    document.getElementById('auth-submit-btn').textContent   = isSignUpMode ? 'Create Account'           : 'Sign In';
    document.getElementById('auth-toggle-text').textContent  = isSignUpMode ? 'Already have an account?' : "Don't have an account?";
    document.getElementById('auth-toggle-btn').textContent   = isSignUpMode ? 'Sign In'                  : 'Sign Up';
    document.getElementById('forgot-btn').style.display      = isSignUpMode ? 'none'                     : 'block';
    document.getElementById('auth-error').textContent = '';
};

window.signOutUser   = async () => { await signOut(auth); showToast('You have been signed out.'); };
window.openAuthModal = (action) => { pendingAction = action||null; document.getElementById('auth-modal').style.display='block'; document.body.style.overflow='hidden'; };
window.closeAuthModal= () => { document.getElementById('auth-modal').style.display='none'; document.body.style.overflow=''; };

window.toggleMyList = async () => {
    if (!currentUser) { openAuthModal('mylist'); return; }
    const story = window.currentStory;
    if (!story) return;
    const ref  = doc(db,'users',currentUser.uid);
    const snap = await getDoc(ref);
    const list = snap.exists() ? (snap.data().myList||[]) : [];
    const exists = list.some(s => s.id === story.id);
    const item   = {id:story.id, title:story.title, genre:story.genre, image:story.image, readTime:story.readTime};
    if (exists) {
        await updateDoc(ref,{myList:arrayRemove(item)}).catch(()=>setDoc(ref,{myList:list.filter(s=>s.id!==story.id)},{merge:true}));
        showToast('Removed from My List');
        document.getElementById('mylist-btn-text').textContent = '+ My List';
    } else {
        snap.exists() ? await updateDoc(ref,{myList:arrayUnion(item)}) : await setDoc(ref,{myList:[item]});
        showToast('✅ Added to My List!');
        document.getElementById('mylist-btn-text').textContent = '✓ In My List';
    }
};

window.openMyList = async () => {
    if (!currentUser) { openAuthModal('mylist'); return; }
    document.getElementById('mylist-modal').style.display = 'block';
    document.body.style.overflow = 'hidden';
    const content = document.getElementById('mylist-content');
    content.innerHTML = '<p style="color:#808080;text-align:center;padding:40px 0;">Loading...</p>';
    try {
        const snap = await getDoc(doc(db,'users',currentUser.uid));
        const list = snap.exists() ? (snap.data().myList||[]) : [];
        if (!list.length) { content.innerHTML='<div style="text-align:center;padding:50px 20px;"><div style="font-size:2.5rem;margin-bottom:14px;">📭</div><p style="color:#808080;font-size:0.92rem;">Your reading list is empty.<br>Tap <strong style=\'color:#fff\'>"+ My List"</strong> on any story.</p></div>'; return; }
        content.innerHTML = '<p style="color:#B3B3B3;font-size:0.82rem;margin-bottom:16px;">'+list.length+' '+(list.length===1?'story':'stories')+' saved</p>'+
            list.map(s=>`<div class="mylist-story-card" onclick="openStory('${s.id}');closeMyList()"><img class="mylist-thumb" src="${s.image}" alt="${s.title}" onerror="this.src='https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=200&q=80'"/><div style="flex:1;min-width:0;"><p style="font-size:0.7rem;color:#E50914;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">${s.genre}</p><p style="font-family:'Playfair Display',serif;font-size:0.98rem;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.title}</p><p style="font-size:0.75rem;color:#808080;">⏱ ${s.readTime} read</p></div><button class="mylist-remove" onclick="event.stopPropagation();removeFromMyList('${s.id}')" title="Remove">🗑</button></div>`).join('');
    } catch(e) { content.innerHTML='<p style="color:#E50914;text-align:center;padding:30px;">Could not load your list.</p>'; }
};

window.removeFromMyList = async (storyId) => {
    if (!currentUser) return;
    const ref  = doc(db,'users',currentUser.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) return;
    await setDoc(ref,{myList:(snap.data().myList||[]).filter(s=>s.id!==storyId)},{merge:true});
    openMyList();
    showToast('Removed from My List');
};

window.closeMyList = () => { document.getElementById('mylist-modal').style.display='none'; document.body.style.overflow=''; };

// Share
window.openShareModal = () => {
    const story = window.currentStory;
    if (!story) return;
    const shareUrl  = `https://laminono-nexus.github.io/?story=${story.id}`;
    const hookLine  = story.excerpt || story.content.split('\n\n')[0].substring(0,120)+'…';
    document.getElementById('share-preview-img').style.backgroundImage = `url('${story.image}')`;
    document.getElementById('share-preview-genre').textContent = story.genre;
    document.getElementById('share-preview-title').textContent = story.title;
    document.getElementById('share-preview-hook').textContent  = hookLine;
    window._shareData = {url:shareUrl, title:story.title, text:hookLine};
    const modal = document.getElementById('share-modal');
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
};

window.closeShareModal = () => { document.getElementById('share-modal').style.display='none'; document.body.style.overflow=''; };

window.shareVia = (platform) => {
    const d   = window._shareData;
    const msg = encodeURIComponent(`📚 "${d.title}"\n\n${d.text}\n\n🔗 Read more: ${d.url}`);
    const url = encodeURIComponent(d.url);
    const links = {
        whatsapp: `https://wa.me/?text=${msg}`,
        twitter:  `https://twitter.com/intent/tweet?text=${msg}`,
        facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
        telegram: `https://t.me/share/url?url=${url}&text=${encodeURIComponent(d.title)}`,
    };
    if (platform === 'instagram' || platform === 'native') {
        if (platform === 'native' && navigator.share) { navigator.share({title:d.title,text:d.text,url:d.url}).catch(()=>{}); return; }
        copyShareLink(); showToast('Link copied! Paste it where you want to share 📋'); return;
    }
    if (links[platform]) window.open(links[platform], '_blank');
    closeShareModal();
};

window.copyShareLink = () => {
    const d = window._shareData;
    const text = `📚 "${d.title}"\n\n${d.text}\n\n🔗 ${d.url}`;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-link-btn');
            if (btn) btn.querySelector('span:last-child').textContent = 'Copied!';
            setTimeout(() => { if (btn) btn.querySelector('span:last-child').textContent = 'Copy Link'; }, 2000);
            showToast('Link copied to clipboard! 🔗');
        });
    } else {
        const el = document.createElement('textarea'); el.value=text; document.body.appendChild(el);
        el.select(); document.execCommand('copy'); document.body.removeChild(el);
        showToast('Link copied! 🔗');
    }
};
</script>

</body>
</html>
