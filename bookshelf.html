<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laminono Nexus — Grand Library</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  
  <!-- Your CSS (save your current file as bookshelf.css) -->
  <link rel="stylesheet" href="bookshelf.css">
</head>
<body>

  <!-- Cinematic Veil -->
  <div id="cinematic-veil"></div>
  <canvas id="dust-canvas"></canvas>

  <!-- Topbar -->
  <nav class="topbar">
    <a href="index.html" class="topbar-home">← Home</a>
    <div class="topbar-logo">
      <span class="topbar-logo-main">Laminono</span>
      <span class="topbar-logo-sub">Grand Library</span>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="search-toggle" title="Search">🔍</button>
      <button class="topbar-btn" id="theme-toggle" title="Theme">✦</button>
    </div>
  </nav>

  <!-- Search Panel -->
  <div class="search-panel" id="search-panel">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search the archives...">
      <button class="search-close-btn" id="search-close">×</button>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- Scene Container -->
  <main class="scene">

    <!-- VIEW: ENTRANCE -->
    <section class="view active" id="view-entrance">
      <div class="entrance-candlelight"></div>
      <div class="entrance-vignette"></div>
      
      <div class="entrance-lockup">
        <span class="entrance-eyebrow">Welcome to</span>
        <span class="entrance-title">The <em>Grand</em> Library</span>
        <div class="entrance-rule"></div>
        <span class="entrance-sub">A sanctuary of stories</span>
      </div>

      <div class="door-stage">
        <div class="door-arch" id="enter-library">
          <div class="door-arch-surround">
            <div class="door-arch-trim"></div>
            <div class="door-arch-trim-2"></div>
            <div class="door-panels-wrap">
              <div class="door-panel-l"></div>
              <div class="door-panel-r"></div>
            </div>
            <div class="door-knobs">
              <div class="door-knob"></div>
              <div class="door-knob"></div>
            </div>
            <div class="door-keyhole">🗝</div>
          </div>
        </div>
        <div class="door-step"></div>
        <div class="door-step-2"></div>
        <div class="door-enter-cta">
          <p>Click the archway to enter</p>
        </div>
      </div>
    </section>

    <!-- VIEW: LIBRARY (Main Shelves) -->
    <section class="view" id="view-library">
      <div class="library-header">
        <h1>The Collections</h1>
        <p class="library-header-sub">Choose a shelf to explore</p>
      </div>
      <div class="shelves-floor" id="shelves-floor">
        <!-- Shelves will be populated by JavaScript -->
      </div>
    </section>

    <!-- VIEW: SUB-SHELVES -->
    <section class="view" id="view-subshelves">
      <div class="view-nav">
        <button class="btn-back" id="back-to-library">← Back to Library</button>
      </div>
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-link" data-view="library">Library</span>
        <span class="bc-sep">/</span>
        <span class="bc-current" id="bc-shelf-name">Collection</span>
      </div>
      <div class="section-heading">
        <h2 id="subshelves-title">Collection Name</h2>
        <div class="section-heading-rule"></div>
        <p id="subshelves-desc">Select a sub-shelf to browse its volumes</p>
      </div>
      <div class="sub-shelf-row" id="sub-shelves-container">
        <!-- Sub-shelves populated by JS -->
      </div>
    </section>

    <!-- VIEW: BOOKS -->
    <section class="view" id="view-books">
      <div class="books-header">
        <div class="view-nav">
          <button class="btn-back" id="back-to-subshelves">← Back</button>
        </div>
        <div class="breadcrumb" id="books-breadcrumb">
          <span class="bc-link" data-view="library">Library</span>
          <span class="bc-sep">/</span>
          <span class="bc-link" data-view="subshelves" id="bc-parent-shelf">Collection</span>
          <span class="bc-sep">/</span>
          <span class="bc-current" id="bc-sub-shelf-name">Shelf</span>
        </div>
        <h2 class="books-shelf-title" id="books-shelf-title">Shelf Name</h2>
      </div>
      <div class="shelf-plank-assembly">
        <div class="plank-lip"></div>
        <div class="plank-surface">
          <div class="books-row" id="books-row">
            <!-- Book spines populated by JS -->
          </div>
        </div>
        <div class="plank-bottom"></div>
      </div>
    </section>

    <!-- VIEW: STORY -->
    <section class="view" id="view-story">
      <div class="view-nav">
        <button class="btn-back" id="back-to-books">← Back to Shelf</button>
      </div>
      <div class="story-container" id="story-container">
        <!-- Story content populated by JS -->
      </div>
    </section>

  </main>

  <!-- Book Cinematic Overlay -->
  <div id="book-cinematic">
    <div class="cin-scene">
      <div class="cin-title-reveal" id="cin-title">Book Title</div>
      <div class="cin-book">
        <div class="cin-cover-l"></div>
        <div class="cin-cover-r"></div>
        <div class="cin-pages">
          <div class="cin-page-lines"></div>
          <div class="cin-page-margin"></div>
        </div>
      </div>
      <div class="cin-light-burst"></div>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // ══════════════════════════════════════════════════
    // LIBRARY DATA
    // ══════════════════════════════════════════════════
    const libraryData = {
      shelves: [
        {
          id: "fiction",
          name: "Fiction",
          icon: "📚",
          tagline: "Tales of imagination",
          count: 3,
          subShelves: [
            {
              id: "classics",
              name: "Classics",
              desc: "Timeless literary masterpieces",
              books: [
                { title: "Pride and Prejudice", author: "Jane Austen", year: 1813, color: "classic-red", blurb: "A romantic novel of manners..." },
                { title: "Moby Dick", author: "Herman Melville", year: 1851, color: "ocean-blue", blurb: "The epic tale of Captain Ahab..." },
                { title: "Great Gatsby", author: "F. Scott Fitzgerald", year: 1925, color: "art-deco", blurb: "The story of the mysteriously wealthy Jay Gatsby..." }
              ]
            },
            {
              id: "scifi",
              name: "Science Fiction",
              desc: "Visions of future worlds",
              books: [
                { title: "Dune", author: "Frank Herbert", year: 1965, color: "desert", blurb: "Set on the desert planet Arrakis..." },
                { title: "Neuromancer", author: "William Gibson", year: 1984, color: "cyber", blurb: "A washed-up computer hacker..." }
              ]
            },
            {
              id: "fantasy",
              name: "Fantasy",
              desc: "Realms of magic and myth",
              books: [
                { title: "The Hobbit", author: "J.R.R. Tolkien", year: 1937, color: "forest", blurb: "Bilbo Baggins is swept into an epic quest..." }
              ]
            }
          ]
        },
        {
          id: "nonfiction",
          name: "Non-Fiction",
          icon: "📖",
          tagline: "Knowledge and truth",
          count: 2,
          subShelves: [
            {
              id: "history",
              name: "History",
              desc: "Chronicles of the past",
              books: [
                { title: "Sapiens", author: "Yuval Noah Harari", year: 2011, color: "earth", blurb: "A brief history of humankind..." }
              ]
            },
            {
              id: "philosophy",
              name: "Philosophy",
              desc: "Thoughts on existence",
              books: [
                { title: "Meditations", author: "Marcus Aurelius", year: 180, color: "marble", blurb: "The personal writings of the Roman Emperor..." }
              ]
            }
          ]
        },
        {
          id: "poetry",
          name: "Poetry",
          icon: "✒️",
          tagline: "Verses of the soul",
          count: 1,
          subShelves: [
            {
              id: "romantic",
              name: "Romantic Era",
              desc: "Passion and nature",
              books: [
                { title: "Leaves of Grass", author: "Walt Whitman", year: 1855, color: "nature", blurb: "A poetry collection celebrating the self..." }
              ]
            }
          ]
        }
      ]
    };

    // ══════════════════════════════════════════════════
    // STATE & NAVIGATION
    // ══════════════════════════════════════════════════
    let currentShelf = null;
    let currentSubShelf = null;

    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const view = document.getElementById('view-' + viewId);
      if (view) {
        view.classList.add('active');
        view.classList.add('animate-in');
        setTimeout(() => view.classList.remove('animate-in'), 500);
      }
      window.scrollTo(0, 0);
    }

    // ══════════════════════════════════════════════════
    // ENTRANCE
    // ══════════════════════════════════════════════════
    document.getElementById('enter-library').addEventListener('click', () => {
      document.getElementById('cinematic-veil').classList.add('fade-in');
      setTimeout(() => {
        showView('library');
        renderShelves();
        document.getElementById('cinematic-veil').classList.remove('fade-in');
        document.getElementById('cinematic-veil').classList.add('fade-out');
        setTimeout(() => document.getElementById('cinematic-veil').classList.remove('fade-out'), 400);
      }, 400);
    });

    // ══════════════════════════════════════════════════
    // RENDER SHELVES
    // ══════════════════════════════════════════════════
    function renderShelves() {
      const floor = document.getElementById('shelves-floor');
      floor.innerHTML = '';

      libraryData.shelves.forEach(shelf => {
        const unit = document.createElement('div');
        unit.className = 'shelf-unit';
        unit.innerHTML = `
          <div class="shelf-body">
            <div class="shelf-plank shelf-plank-a"></div>
            <div class="shelf-plank shelf-plank-b"></div>
            <div class="shelf-nameplate">
              <span class="nameplate-icon">${shelf.icon}</span>
              <span class="nameplate-title">${shelf.name}</span>
              <span class="nameplate-count">${shelf.subShelves.length} collections</span>
              <span class="nameplate-tagline">${shelf.tagline}</span>
            </div>
            <div class="shelf-interior">
              <div class="shelf-sub-indicators">
                ${shelf.subShelves.map(() => `<div class="sub-indicator"></div>`).join('')}
              </div>
              <div class="shelf-await">Enter to explore</div>
            </div>
          </div>
          <div class="shelf-base"></div>
        `;
        unit.addEventListener('click', () => openSubShelves(shelf));
        floor.appendChild(unit);
      });
    }

    // ══════════════════════════════════════════════════
    // SUB-SHELVES
    // ══════════════════════════════════════════════════
    function openSubShelves(shelf) {
      currentShelf = shelf;
      document.getElementById('subshelves-title').textContent = shelf.name;
      document.getElementById('subshelves-desc').textContent = shelf.tagline;
      document.getElementById('bc-shelf-name').textContent = shelf.name;

      const container = document.getElementById('sub-shelves-container');
      container.innerHTML = '';

      shelf.subShelves.forEach(sub => {
        const unit = document.createElement('div');
        unit.className = 'sub-shelf-unit';
        unit.innerHTML = `
          <div class="sub-shelf-body">
            <div class="sub-shelf-plate">
              <span class="sub-plate-name">${sub.name}</span>
              <span class="sub-plate-count">${sub.books.length} volumes</span>
            </div>
            <div class="sub-shelf-interior">
              <div class="sub-shelf-desc">${sub.desc}</div>
            </div>
          </div>
          <div class="sub-shelf-base"></div>
        `;
        unit.addEventListener('click', () => openBooks(sub));
        container.appendChild(unit);
      });

      showView('subshelves');
    }

    document.getElementById('back-to-library').addEventListener('click', () => showView('library'));

    // ══════════════════════════════════════════════════
    // BOOKS
    // ══════════════════════════════════════════════════
    function openBooks(subShelf) {
      currentSubShelf = subShelf;
      document.getElementById('books-shelf-title').textContent = subShelf.name;
      document.getElementById('bc-parent-shelf').textContent = currentShelf.name;
      document.getElementById('bc-sub-shelf-name').textContent = subShelf.name;

      const row = document.getElementById('books-row');
      row.innerHTML = '';

      if (subShelf.books.length === 0) {
        row.innerHTML = `
          <div class="shelf-empty-msg">
            <p>This shelf awaits its first volume...</p>
          </div>
        `;
      } else {
        subShelf.books.forEach((book, i) => {
          const spine = document.createElement('div');
          spine.className = 'book-spine';
          spine.innerHTML = `<span class="spine-title">${book.title}</span>`;
          spine.addEventListener('click', () => openBook(book));
          row.appendChild(spine);
        });
      }

      showView('books');
    }

    document.getElementById('back-to-subshelves').addEventListener('click', () => showView('subshelves'));

    // ══════════════════════════════════════════════════
    // STORY / BOOK OPEN
    // ══════════════════════════════════════════════════
    function openBook(book) {
      // Cinematic overlay
      const overlay = document.getElementById('book-cinematic');
      document.getElementById('cin-title').textContent = book.title;
      overlay.classList.add('active');

      setTimeout(() => {
        overlay.classList.remove('active');
        renderStory(book);
        showView('story');
      }, 2200);
    }

    function renderStory(book) {
      const container = document.getElementById('story-container');
      container.innerHTML = `
        <div class="story-cover-block">
          <div class="story-cover-placeholder">
            <span class="cover-icon">📖</span>
            <span class="cover-label">${book.title}<br>${book.year}</span>
          </div>
          <div class="story-meta">
            <span class="story-badge">${currentSubShelf.name}</span>
            <h1 class="story-title">${book.title}</h1>
            <p class="story-author">by ${book.author}</p>
            <p class="story-blurb">${book.blurb}</p>
          </div>
        </div>
        <div class="story-ornament-rule"><span>❦</span></div>
        <div class="story-body">
          <p>${book.blurb} The full text would appear here, flowing like ancient parchment across the screen. Each paragraph carries the weight of centuries, each sentence a carefully crafted vessel of meaning...</p>
          <p>Continue reading to discover the complete narrative, rich with detail and woven with the golden threads of literary tradition.</p>
        </div>
        <div class="engage-panel">
          <div class="engage-section-title">Rate this volume</div>
          <div class="stars-row">
            <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
          </div>
          <div class="engage-divider"></div>
          <div class="engage-section-title">Leave a thought</div>
          <textarea class="comment-box" placeholder="Share your reflections..."></textarea>
          <button class="btn-post">Post Comment</button>
          <div class="engage-divider"></div>
          <div class="engage-section-title">Appreciate the author</div>
          <div class="coin-row">
            <button class="btn-coin">1 ✦</button>
            <button class="btn-coin">5 ✦</button>
            <button class="btn-coin">10 ✦</button>
          </div>
        </div>
      `;

      // Star rating interaction
      container.querySelectorAll('.star').forEach((star, i) => {
        star.addEventListener('click', () => {
          container.querySelectorAll('.star').forEach((s, j) => {
            s.classList.toggle('lit', j <= i);
          });
        });
      });
    }

    document.getElementById('back-to-books').addEventListener('click', () => showView('books'));

    // ══════════════════════════════════════════════════
    // SEARCH
    // ══════════════════════════════════════════════════
    const searchPanel = document.getElementById('search-panel');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    document.getElementById('search-toggle').addEventListener('click', () => {
      searchPanel.classList.toggle('open');
      if (searchPanel.classList.contains('open')) searchInput.focus();
    });

    document.getElementById('search-close').addEventListener('click', () => {
      searchPanel.classList.remove('open');
    });

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      if (!query) {
        searchResults.classList.remove('has-results');
        return;
      }

      const results = [];
      libraryData.shelves.forEach(shelf => {
        shelf.subShelves.forEach(sub => {
          sub.books.forEach(book => {
            if (book.title.toLowerCase().includes(query) || book.author.toLowerCase().includes(query)) {
              results.push({ book, shelf: shelf.name, sub: sub.name });
            }
          });
        });
      });

      searchResults.innerHTML = results.map(r => `
        <div class="search-result-item" data-book="${r.book.title}">
          <span class="sr-title">${r.book.title}</span>
          <span class="sr-path">${r.shelf} → ${r.sub}</span>
        </div>
      `).join('');
      searchResults.classList.toggle('has-results', results.length > 0);
    });

    // ══════════════════════════════════════════════════
    // BREADCRUMB NAVIGATION
    // ══════════════════════════════════════════════════
    document.querySelectorAll('.bc-link').forEach(link => {
      link.addEventListener('click', () => {
        const view = link.dataset.view;
        if (view === 'library') showView('library');
        if (view === 'subshelves') showView('subshelves');
      });
    });

    // ══════════════════════════════════════════════════
    // DUST PARTICLES (Simple Canvas)
    // ══════════════════════════════════════════════════
    const canvas = document.getElementById('dust-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    for (let i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.5,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        opacity: Math.random() * 0.5 + 0.1
      });
    }

    function animateDust() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 168, 108, ${p.opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(animateDust);
    }
    animateDust();
    canvas.classList.add('visible');

  </script>
</body>
</html>
